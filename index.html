<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transcriptor</title>
<style>
  @font-face { font-family: 'XSF'; src: url('XSF.woff2') format('woff2'); font-display: swap; }
  :root { --bg:#14151a; --fg:#e8e8ec; --mut:#8a8a93; --acc:#6ad; --pan:#1d1f26; --bd:#333; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,sans-serif; line-height:1.5; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 16px 64px; }
  h1 { font-size: 2.6rem; font-weight: 800; letter-spacing:-.02em; margin: 0 0 14px; }
  .mut { color: var(--mut); font-size: .85rem; }
  textarea { width:100%; background:var(--pan); color:var(--fg); border:1px solid var(--bd); border-radius:12px; padding:14px; font-size:1.05rem; resize:vertical; }
  .row { display:flex; flex-wrap:wrap; gap:12px 20px; align-items:center; margin:12px 0; }
  label { font-size:.9rem; }
  select, input[type=number], input[type=color] { background:var(--pan); color:var(--fg); border:1px solid var(--bd); border-radius:7px; padding:5px 8px; }
  button { background:var(--acc); color:#06121c; border:0; border-radius:8px; padding:9px 16px; font-weight:600; cursor:pointer; }
  #mode { font-size:1rem; padding:8px 10px; }
  /* input i sortida costat a costat, mateixa mida */
  .io { display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:stretch; margin-top:6px; }
  .io > * { margin:0; min-height:180px; }
  #input { height:100%; }
  #outwrap { background:var(--pan); border:1px solid var(--bd); border-radius:12px; padding:14px; overflow:auto; }
  #out { font-family:'XSF'; font-size:56px; line-height:1.3; word-break:break-word; }
  #out.afi { font-family:ui-monospace,monospace; font-size:1.5rem; line-height:1.5; }
  @media (max-width:680px) { .io { grid-template-columns:1fr; } }
  #debug { white-space:pre-wrap; color:var(--mut); font-family:ui-monospace,monospace; font-size:.8rem; margin-top:10px; }
  #status { color:var(--acc); font-size:.85rem; min-height:1.2em; }
  details { background:var(--pan); border:1px solid var(--bd); border-radius:12px; margin-top:14px; }
  summary { cursor:pointer; padding:14px 18px; font-weight:600; }
  details > .body { padding: 4px 18px 18px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; }
  .fld label { display:block; font-size:.82rem; color:var(--mut); margin-bottom:4px; }
  .fld textarea { min-height:84px; font-family:ui-monospace,monospace; font-size:.85rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Transcriptor</h1>

  <div class="row">
    <label>Mode:
      <select id="mode">
        <option value="cat-xsf">Català → XSF</option>
        <option value="cat-afi">Català → AFI</option>
        <option value="afi-xsf">AFI → XSF</option>
        <option value="xsf-afi">XSF → AFI</option>
      </select>
    </label>
    <span id="catonly">
      <label>Dialecte:
        <select id="dialecte">
          <option value="ca">Central</option>
          <option value="ca-va">Valencià</option>
          <option value="ca-nw">Nord-occidental</option>
          <option value="ca-ba">Balear</option>
          <option value="ca-al">Alguerès</option>
          <option value="ca-ro">Rossellonès</option>
        </select>
      </label>
    </span>
    <label>Sistema sil·làbic:
      <select id="sistema">
        <option value="kib">kib (minúscules)</option>
        <option value="ktb">ktb (consonant integral)</option>
        <option value="bkk">bkk (vocal integral)</option>
      </select>
    </label>
    <span id="status">carregant…</span>
  </div>

  <div class="io">
    <textarea id="input" placeholder="escriu aquí…">una àmfora amb vint metges; el gat menja peix</textarea>
    <div id="outwrap"><div id="out"></div></div>
  </div>
  <div id="debug"></div>

  <details open>
    <summary>Opcions Ortogràfiques</summary>
    <div class="body">
      <div class="row">
        <label><input type="checkbox" id="tonicitat" checked> Tonicitat</label>
        <label><input type="checkbox" id="geminacio" checked> Geminació</label>
        <label><input type="checkbox" id="espais" checked> Aïllar paraules</label>
        <label><input type="checkbox" id="uphangv"> Vocals Penjades Integrals</label>
        <label><input type="checkbox" id="uphangc"> Consonants Penjades Integrals</label>
      </div>
    </div>
  </details>

  <details>
    <summary>Opcions Prosòdiques</summary>
    <div class="body">
      <div class="row">
        <label><input type="checkbox" id="elisio" checked> elisió de la vocal neutra (enllaç de paraules)</label>
        <label><input type="checkbox" id="diftongs"> diftongs / sinalefes</label>
      </div>
      <div class="grid">
        <div class="fld">
          <label>Parells de vocals → diftong (un per línia, en grafia XSF, p. ex. «e x»)</label>
          <textarea id="pairs"></textarea>
        </div>
        <div class="fld">
          <label>Excepcions: paraules on NO elidir (separades per espais o comes)</label>
          <textarea id="except"></textarea>
        </div>
        <div class="fld">
          <label>Substitucions de paraula → XSF (p. ex. «però  prò+»)</label>
          <textarea id="subs"></textarea>
        </div>
      </div>
    </div>
  </details>

  <details>
    <summary>Opcions d'Imatge</summary>
    <div class="body">
      <div class="row">
        <label>Mida: <input type="number" id="imgsize" value="96" min="16" max="400" step="8"></label>
        <label>Color: <input type="color" id="color" value="#000000"></label>
        <label><input type="checkbox" id="transparent"> fons transparent</label>
        <button id="dl">Descarrega imatge PNG</button>
      </div>
    </div>
  </details>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
